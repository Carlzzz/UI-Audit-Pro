<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UI 走查靶机测试页</title>
    <style>
        /* ⚠️ 故意埋设的样式缺陷区 
           (对比基准值：主题色 #256af4, 间距 4/8/16, 圆角 4/8/12, 字体 14/16/32)
        */
        body {
            /* 缺陷 1：错误的字体族 */
            font-family: "Comic Sans MS", "微软雅黑", sans-serif; 
            background-color: #f9f9f9;
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            /* 缺陷 2：使用了规范外的间距 15px 和 20px */
            padding: 15px; 
            /* 缺陷 3：使用了规范外的圆角 10px */
            border-radius: 10px; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        h1 {
            /* 缺陷 4：使用了规范外的字号 28px (规范是 32px) */
            font-size: 28px; 
            color: #333;
        }

        .btn-primary {
            /* 缺陷 5：近色误差，错误的主题色 #266bf5 (规范是 #256af4) */
            background-color: #266bf5; 
            color: white;
            border: none;
            /* 缺陷 6：点击热区高度仅为 30px (规范要求 >= 44px) */
            height: 30px; 
            padding: 0 15px;
            cursor: pointer;
            /* 缺陷 3：使用了规范外的圆角 5px */
            border-radius: 5px; 
        }

        .text-body {
            /* 缺陷 4：规范外字号 15px (规范是 14px 或 16px) */
            font-size: 15px; 
            /* 缺陷 7：错误的行高 1.4 (规范是 1.2, 1.5, 1.6) */
            line-height: 1.4; 
            color: #666;
        }

        .card-list {
            display: flex;
            /* 缺陷 2：规范外间距 10px */
            gap: 10px; 
            margin-top: 20px;
        }

        .card-item {
            flex: 1;
            padding: 10px;
            border: 1px solid #eee;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>欢迎来到产品体验测试区</h1>
        <h3>这是一个副标题（H3）</h3>

        <p class="text-body">
            这个页面包含了很多不符合企业 UI 规范的元素。请使用自动化走查工具输入当前页面的地址，看看大模型能否把这些问题全部揪出来。
        </p>

        <button class="btn-primary">立即体验 (错误热区与色值)</button>

        <div class="card-list">
            <div class="card-item">
                <img src="https://via.placeholder.com/300x150.png?text=Missing+Alt" width="100%">
                <p class="text-body">图文卡片 1</p>
            </div>
            <div class="card-item">
                <img src="https://via.placeholder.com/300x150.png?text=Test+Image" alt="测试图片" width="100%">
                <p class="text-body">图文卡片 2</p>
            </div>
        </div>
    </div>

</body>
</html>
